<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Invisible Slide Puzzle</title>
<style>
  /* ===========================================================
     デザイントークン
     「薄灰色 × ベージュ」の落ち着いたモダン建築風パレット。
     コンクリート・石材・真鍮の金具をイメージした配色にしている。
     =========================================================== */
  :root {
    --bg-1: #F6F3EC;        /* 背景の明るいベージュ(漆喰) */
    --bg-2: #E9E3D6;        /* 背景の影側(淡いグレージュ) */
    --panel: #ECE7DA;       /* 盤面カードの地色(石板) */
    --panel-border: #CFC6AF;/* 石板の縁取り */
    --stone: #D8D1BF;       /* グリッド外枠 */
    --tile-bg: #FBFAF5;     /* タイル(白い石材) */
    --tile-border: #B9AF97; /* タイルの縁(石の陰影) */
    --tile-active: #EFE8D8; /* タイル押下時 */
    --ink: #3B362B;         /* メインテキスト(墨・玄武岩) */
    --ink-soft: #8B826D;    /* サブテキスト */
    --brass: #A47C3E;       /* 真鍮アクセント */
    --brass-soft: rgba(164, 124, 62, 0.16);
    --brass-glow: rgba(164, 124, 62, 0.35);
  }

  /* ===========================================================
     全体レイアウト
     =========================================================== */
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow-x: hidden;
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN",
                 "Yu Gothic", sans-serif;
    /* 上から淡く光が落ちる漆喰の壁のようなグラデーション */
    background:
      radial-gradient(ellipse 900px 500px at 50% -8%, #FDFBF6 0%, transparent 60%),
      linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
    background-attachment: fixed;
  }

  .app {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 16px 48px;
    gap: 22px;
  }

  .eyebrow {
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0;
  }

  h1 {
    font-size: 21px;
    font-weight: 700;
    letter-spacing: 0.02em;
    margin: 2px 0 0;
    color: var(--ink);
    text-align: center;
  }

  .subtitle {
    font-size: 12.5px;
    color: var(--ink-soft);
    margin-top: -6px;
    text-align: center;
    letter-spacing: 0.01em;
  }

  /* ===========================================================
     盤面まわり
     =========================================================== */

  /* 盤面全体を包む石板のようなカード */
  .board-wrap {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: min(88vw, 380px);
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 18px;
    padding: 20px;
    box-shadow:
      0 1px 0 rgba(255, 255, 255, 0.6) inset,
      0 18px 40px -22px rgba(59, 54, 43, 0.35),
      0 2px 6px rgba(59, 54, 43, 0.06);
  }

  /* グリッドを内包する行(行ボタン + グリッド) */
  .main-row {
    display: flex;
    align-items: center;
    gap: var(--gap, 12px);
  }

  /* 行確認ボタンを入れる箱。JSでグリッドと同じ高さに揃え、
     各ボタンはその中で絶対配置してタイルの行中心に合わせる */
  .row-buttons-col {
    position: relative;
    width: var(--side-btn-size, 44px);
    flex-shrink: 0;
  }

  /* 丸い確認ボタン(行ボタン用)。真鍮の鋲(リベット)のイメージ。
     JSでtransformによりタイルの行の中心Y座標へ正確に配置する */
  .round-btn {
    position: absolute;
    left: 0;
    top: 0;
    width: var(--side-btn-size, 44px);
    height: var(--side-btn-size, 44px);
    border-radius: 50%;
    border: 1.5px solid var(--tile-border);
    background: linear-gradient(160deg, #FDFBF6, #EDE7D8);
    color: var(--ink-soft);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.01em;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    user-select: none;
    padding: 0;
    box-shadow: 0 1px 2px rgba(59, 54, 43, 0.08);
  }

  .round-btn:active {
    background: var(--tile-active);
  }

  .round-btn:disabled {
    cursor: default;
    opacity: 0.55;
  }

  /* 再生中に光る演出(真鍮に灯りが点るイメージ) */
  .round-btn.playing {
    background: radial-gradient(circle, #FFF3DA 0%, #F2DFB6 100%);
    border-color: var(--brass);
    box-shadow: 0 0 0 5px var(--brass-soft), 0 0 14px var(--brass-glow);
    color: var(--brass);
  }

  /* 3x3 タイルグリッド本体(石板に彫り込まれた窪みのイメージ) */
  .grid-outer {
    flex: 1;
    position: relative;
    aspect-ratio: 1 / 1;
    background: var(--stone);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    box-shadow: inset 0 2px 6px rgba(59, 54, 43, 0.12);
  }

  #grid {
    position: absolute;
    inset: 0;
  }

  /* タイル外枠: 位置・サイズだけを担当し、動きはtransformのみで行う */
  .tile {
    position: absolute;
    cursor: pointer;
    transition: transform 0.22s cubic-bezier(0.4, 0.0, 0.2, 1);
    will-change: transform;
  }

  /* タイルの見た目(石材風の白いタイル)。
     内側の要素に分離することで、位置移動(translate)と
     ポヨンと弾む拡大縮小(scale)を独立してアニメーションできる */
  .tile-inner {
    position: absolute;
    inset: 0;
    background: linear-gradient(165deg, var(--tile-bg), #F3EFE3);
    border: 1.5px solid var(--tile-border);
    border-radius: 9px;
    box-shadow: 0 2px 3px rgba(59, 54, 43, 0.08);
    transition: background 0.15s ease, transform 0.12s ease;
    transform-origin: center;
  }

  .tile:active .tile-inner {
    background: var(--tile-active);
  }

  /* 音が鳴っている瞬間に「ポヨン」と弾ませるアニメーション */
  .tile-inner.poyon {
    animation: poyon-bounce 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes poyon-bounce {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.16, 0.88); }
    55%  { transform: scale(0.92, 1.1); }
    78%  { transform: scale(1.05, 0.97); }
    100% { transform: scale(1); }
  }

  /* クリア時、盤面全体がふわっと金色に発光する演出(より壮大に) */
  .grid-outer.celebrating {
    animation: board-glow 1.8s ease-in-out;
  }

  @keyframes board-glow {
    0%   { box-shadow: inset 0 2px 6px rgba(59, 54, 43, 0.12); }
    35%  { box-shadow: inset 0 2px 6px rgba(59, 54, 43, 0.12), 0 0 0 10px var(--brass-soft), 0 0 46px var(--brass-glow); }
    100% { box-shadow: inset 0 2px 6px rgba(59, 54, 43, 0.12); }
  }

  /* キラキラの粒(クリア演出用)。発生地点から外側へ飛んでいく */
  .spark {
    position: absolute;
    left: 0;
    top: 0;
    border-radius: 50%;
    background: radial-gradient(circle, #FFFDF6 0%, var(--brass) 60%, transparent 100%);
    opacity: 0;
    pointer-events: none;
    z-index: 5;
    animation-name: spark-fly;
    animation-timing-function: cubic-bezier(0.15, 0.6, 0.35, 1);
    animation-fill-mode: forwards;
  }

  /* 星型のキラキラ(四芒星)。円だけより煌びやかに見せるための差し色 */
  .spark.star {
    border-radius: 0;
    background: linear-gradient(160deg, #FFFBEC, var(--brass));
    clip-path: polygon(
      50% 0%, 63% 37%, 100% 50%, 63% 63%,
      50% 100%, 37% 63%, 0% 50%, 37% 37%
    );
  }

  @keyframes spark-fly {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.15) rotate(0deg); }
    18%  { opacity: 1; }
    100% {
      opacity: 0;
      transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy)))
                 scale(var(--peak, 1)) rotate(var(--rot, 90deg));
    }
  }

  /* クリア演出オーバーレイ */
  .clear-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(246, 243, 236, 0.88);
    backdrop-filter: blur(3px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
    border-radius: 12px;
    z-index: 6;
  }

  .clear-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  .clear-text {
    font-size: clamp(28px, 8vw, 40px);
    font-weight: 800;
    letter-spacing: 0.12em;
    color: var(--ink);
    position: relative;
    padding-bottom: 10px;
    transform: scale(0.3);
    opacity: 0;
  }

  .clear-text::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: 0;
    width: 46px;
    height: 2px;
    background: var(--brass);
    transform: translateX(-50%);
  }

  /* CLEAR! の文字が「ぽよん」と飛び出してくるアニメーション */
  .clear-overlay.show .clear-text {
    animation: clear-pop 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  @keyframes clear-pop {
    0%   { transform: scale(0.3); opacity: 0; }
    55%  { transform: scale(1.2); opacity: 1; }
    78%  { transform: scale(0.92); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ===========================================================
     操作ボタン群(Shuffle / Mute)
     =========================================================== */
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .ctrl-btn {
    padding: 9px 20px;
    border-radius: 20px;
    border: 1.5px solid var(--ink);
    background: transparent;
    color: var(--ink);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.01em;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease, transform 0.1s ease, border-color 0.15s ease, opacity 0.15s ease;
  }

  .ctrl-btn:active {
    transform: scale(0.96);
  }

  .ctrl-btn:hover {
    background: var(--brass-soft);
    border-color: var(--brass);
    color: var(--brass);
  }

  .ctrl-btn.active-toggle {
    background: var(--ink);
    border-color: var(--ink);
    color: #FBFAF5;
  }

  .ctrl-btn:disabled {
    opacity: 0.45;
    cursor: default;
    background: transparent;
    color: var(--ink);
  }

  .status {
    font-size: 12px;
    color: var(--ink-soft);
    min-height: 16px;
  }

  /* 回数カウンター表示(画面右下に固定・縦に2段) */
  .counters {
    position: fixed;
    right: 16px;
    bottom: 14px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 3px;
    user-select: none;
  }

  .counter-line {
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.02em;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>
<div class="app">

  <p class="eyebrow">Sound-Only Puzzle</p>
  <h1>Invisible Slide Puzzle</h1>
  <div class="subtitle">音だけを頼りに、8パズルを揃えよう</div>

  <div class="board-wrap" id="boardWrap">
    <!-- 左側: 行確認ボタン(Row1〜Row3) ※音を聞けるのはこの3つだけ -->
    <div class="main-row">
      <div class="row-buttons-col" id="rowButtons"></div>
      <div class="grid-outer" id="gridOuter">
        <div id="grid"></div>
        <div class="clear-overlay" id="clearOverlay">
          <div class="clear-text">CLEAR!</div>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" id="shuffleBtn">Shuffle</button>
    <button class="ctrl-btn" id="muteBtn">Mute: OFF</button>
  </div>

  <div class="status" id="statusText"></div>

</div>

<!-- 右下の回数カウンター: 上段=動かした回数 / 下段=音を聞いた回数 -->
<div class="counters" id="counters">
  <div class="counter-line" id="moveCount">動かした回数: 0</div>
  <div class="counter-line" id="playCount">音を聞いた回数: 0</div>
</div>

<script>
(function () {
  "use strict";

  /* ===========================================================
     定数・状態管理
     =========================================================== */

  // 完成形: 1〜8が順番に並び、右下(index 8)が空白(0)
  const SOLVED_STATE = [1, 2, 3, 4, 5, 6, 7, 8, 0];

  // 番号(1〜8)に対応する音階の周波数(Hz)
  // 1=ド 2=レ 3=ミ 4=ファ 5=ソ 6=ラ 7=シ 8=高いド
  const NOTE_FREQ = {
    1: 261.63, // ド (C4)
    2: 293.66, // レ (D4)
    3: 329.63, // ミ (E4)
    4: 349.23, // ファ (F4)
    5: 392.00, // ソ (G4)
    6: 440.00, // ラ (A4)
    7: 493.88, // シ (B4)
    8: 523.25  // 高いド (C5)
  };

  const NOTE_DURATION = 0.35; // 1音の長さ(秒)
  const NOTE_GAP = 0.08;      // 音と音の間隔(秒)

  // board: 9マス分の配列。board[position] = 番号(0は空白)
  let board = [];
  // ゲームクリア済みかどうか(クリア後は操作をロックする)
  let isCleared = false;
  // 音再生中は他の音源ボタン操作をロックする
  let isPlayingSound = false;
  // ミュート状態
  let isMuted = false;

  // Web Audio API のコンテキスト(初回のユーザー操作時に生成する)
  let audioCtx = null;

  /* ===========================================================
     DOM要素の取得
     =========================================================== */
  const gridEl = document.getElementById("grid");
  const gridOuterEl = document.getElementById("gridOuter");
  const clearOverlayEl = document.getElementById("clearOverlay");
  const rowButtonsEl = document.getElementById("rowButtons");
  const shuffleBtn = document.getElementById("shuffleBtn");
  const muteBtn = document.getElementById("muteBtn");
  const statusText = document.getElementById("statusText");
  const playCountEl = document.getElementById("playCount");
  const moveCountEl = document.getElementById("moveCount");

  /* ===========================================================
     初期化
     =========================================================== */
  function init() {
    createRowButtons();
    createTileElements();
    shuffleBoard({ animateCountReset: false }); // 初回は0のままなのでアニメ不要
    window.addEventListener("resize", layoutTiles);

    shuffleBtn.addEventListener("click", () => shuffleBoard({ animateCountReset: true }));
    muteBtn.addEventListener("click", toggleMute);
  }

  /* ===========================================================
     AudioContext を用意する(ユーザー操作起点で生成)
     =========================================================== */
  function ensureAudioContext() {
    if (!audioCtx) {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AudioContextClass();
    }
    // ブラウザによっては suspended 状態で生成されるので再開しておく
    if (audioCtx.state === "suspended") {
      audioCtx.resume();
    }
    return audioCtx;
  }

  /* ===========================================================
     1音だけ再生する(木琴っぽい音色)
     木琴の特徴: アタックが速く、すぐに減衰する。
     基音に加えて高次倍音(だいたい基音の3.9倍)を薄く重ねることで
     「コーン」という木製マレットの硬い響きに近づけている。
     戻り値: 再生完了(待ち時間込み)を知らせる Promise
     =========================================================== */
  function playNote(freq) {
    return new Promise((resolve) => {
      if (isMuted) {
        // ミュート中は実際には鳴らさず、間隔だけ空けて次に進む
        setTimeout(resolve, (NOTE_DURATION + NOTE_GAP) * 1000);
        return;
      }

      const ctx = ensureAudioContext();
      const now = ctx.currentTime;

      const masterGain = ctx.createGain();
      masterGain.connect(ctx.destination);

      const attack = 0.004;          // 木琴らしい鋭いアタック
      const decayTo = 0.001;         // 指数減衰の底値(0にはできないため極小値)

      masterGain.gain.setValueAtTime(0, now);
      masterGain.gain.linearRampToValueAtTime(0.34, now + attack);
      masterGain.gain.exponentialRampToValueAtTime(decayTo, now + NOTE_DURATION);

      // 基音(サイン波)
      const fundamental = ctx.createOscillator();
      fundamental.type = "sine";
      fundamental.frequency.value = freq;
      fundamental.connect(masterGain);

      // 高次倍音(木琴特有のカーンとした硬さを出す、音量は控えめ)
      const overtone = ctx.createOscillator();
      overtone.type = "sine";
      overtone.frequency.value = freq * 3.93;
      const overtoneGain = ctx.createGain();
      overtoneGain.gain.setValueAtTime(0.16, now);
      overtoneGain.gain.exponentialRampToValueAtTime(decayTo, now + NOTE_DURATION * 0.5);
      overtone.connect(overtoneGain);
      overtoneGain.connect(masterGain);

      fundamental.start(now);
      overtone.start(now);
      fundamental.stop(now + NOTE_DURATION);
      overtone.stop(now + NOTE_DURATION);

      setTimeout(resolve, (NOTE_DURATION + NOTE_GAP) * 1000);
    });
  }

  /* ===========================================================
     クリア演出用: 「じゃーん!」というシンバルクラッシュ音
     ホワイトノイズ(ハイパスで金属的に)+ 非整数倍音の矩形波を
     何本か重ねて、長い余韻で減衰させることでシンバルらしさを出す
     =========================================================== */
  function playCymbalCrash() {
    if (isMuted) return;

    const ctx = ensureAudioContext();
    const now = ctx.currentTime;
    const duration = 1.5;

    const masterGain = ctx.createGain();
    masterGain.gain.setValueAtTime(0.0001, now);
    masterGain.gain.linearRampToValueAtTime(0.32, now + 0.01);
    masterGain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
    masterGain.connect(ctx.destination);

    // ノイズ成分(シャーッという金属的な質感)
    const bufferSize = Math.floor(ctx.sampleRate * duration);
    const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = Math.random() * 2 - 1;
    }
    const noiseSource = ctx.createBufferSource();
    noiseSource.buffer = noiseBuffer;

    const highpass = ctx.createBiquadFilter();
    highpass.type = "highpass";
    highpass.frequency.value = 5000;

    noiseSource.connect(highpass);
    highpass.connect(masterGain);
    noiseSource.start(now);
    noiseSource.stop(now + duration);

    // 非整数倍音を重ねて金属的な響きを補強する(簡易シンバル合成)
    const partials = [3020, 3400, 4200, 4800, 5600, 6600];
    partials.forEach((freq) => {
      const osc = ctx.createOscillator();
      osc.type = "square";
      osc.frequency.value = freq;

      const g = ctx.createGain();
      g.gain.setValueAtTime(0.05, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + duration * 0.75);

      osc.connect(g);
      g.connect(masterGain);
      osc.start(now);
      osc.stop(now + duration);
    });
  }

  /* ===========================================================
     行確認ボタンの生成(音を聞けるのはこの3つだけ)
     =========================================================== */
  function createRowButtons() {
    for (let r = 0; r < 3; r++) {
      const btn = document.createElement("button");
      btn.className = "round-btn";
      btn.textContent = "Row" + (r + 1);
      btn.dataset.row = r;
      btn.addEventListener("click", () => onRowButtonClick(r, btn));
      rowButtonsEl.appendChild(btn);
    }
  }

  // 現在ボード上で操作を受け付けてよいかどうか
  function canInteract() {
    return !isCleared && !isPlayingSound;
  }

  function setAllSideButtonsDisabled(disabled) {
    [...rowButtonsEl.children].forEach((b) => (b.disabled = disabled));
  }

  async function onRowButtonClick(rowIndex, btnEl) {
    if (!canInteract()) return; // クリア中・再生中はRowボタンも反応させない
    // その行(左→右)に並ぶ3マスの位置を取得
    const positions = [rowIndex * 3 + 0, rowIndex * 3 + 1, rowIndex * 3 + 2];
    await runSidePlayback(btnEl, positions);
  }

  // 指定された位置(左→右 または 上→下)の順に、
  // 「タイルをポヨンと弾ませる」+「音を鳴らす」を同時に行う
  async function runSidePlayback(btnEl, positions) {
    isPlayingSound = true;
    setAllSideButtonsDisabled(true);
    btnEl.classList.add("playing");

    incrementPlayCount(); // 音を聞いた回数をカウント

    for (const pos of positions) {
      const num = board[pos];
      if (num !== 0) {
        bounceTile(num);
        await playNote(NOTE_FREQ[num]);
      }
    }

    btnEl.classList.remove("playing");
    isPlayingSound = false;
    // クリア済みでなければボタンを再度押せるようにする
    if (!isCleared) setAllSideButtonsDisabled(false);
  }

  // 指定した番号のタイルを「ポヨン」と一瞬弾ませる
  function bounceTile(num) {
    const tileEl = getTileElByNum(num);
    const innerEl = tileEl.querySelector(".tile-inner");
    innerEl.classList.remove("poyon");
    void innerEl.offsetWidth; // 強制リフローでアニメーションを再始動させる
    innerEl.classList.add("poyon");
  }

  /* ===========================================================
     回数カウンター(音を聞いた回数 / 動かした回数)
     どちらもShuffle時に「トゥルルル」と高速カウントダウンして0へ戻る
     =========================================================== */
  let playCount = 0;
  let moveCount = 0;

  function incrementPlayCount() {
    playCount++;
    playCountEl.textContent = "音を聞いた回数: " + playCount;
  }

  function incrementMoveCount() {
    moveCount++;
    moveCountEl.textContent = "動かした回数: " + moveCount;
  }

  // 数字を「トゥルルル」と高速カウントダウンさせながら0にするアニメーション
  function animateCountdown(el, label, startValue) {
    if (startValue <= 0) {
      el.textContent = label + ": 0";
      return;
    }
    const stepMs = Math.max(18, Math.min(55, 500 / startValue));
    let current = startValue;

    const timer = setInterval(() => {
      current--;
      if (current <= 0) {
        current = 0;
        clearInterval(timer);
      }
      el.textContent = label + ": " + current;
    }, stepMs);
  }

  /* ===========================================================
     タイルDOM要素の生成(初回のみ・以後は使い回す)
     tile(位置・サイズ担当) の中に tile-inner(見た目担当) を
     入れる二重構造にして、移動と弾む演出を独立させている
     =========================================================== */
  function createTileElements() {
    gridEl.innerHTML = "";
    for (let num = 1; num <= 8; num++) {
      const tileEl = document.createElement("div");
      tileEl.className = "tile";
      tileEl.dataset.num = num;
      tileEl.addEventListener("click", () => onTileClick(num));

      const innerEl = document.createElement("div");
      innerEl.className = "tile-inner";
      tileEl.appendChild(innerEl);

      gridEl.appendChild(tileEl);
    }
  }

  function getTileElByNum(num) {
    return gridEl.querySelector('.tile[data-num="' + num + '"]');
  }

  /* ===========================================================
     タイルの配置(座標計算)
     board配列上のインデックス(0〜8)から
     行・列を求め、実ピクセル位置に変換して transform で配置する
     行確認ボタンのY座標も、同じ計算式でタイルの行の中心に揃える
     =========================================================== */
  function layoutTiles() {
    const outerSize = gridOuterEl.clientWidth;
    const gap = Math.max(4, outerSize * 0.025);
    const cell = (outerSize - gap * 4) / 3; // 外周にもgap相当の余白を作る

    for (let pos = 0; pos < 9; pos++) {
      const num = board[pos];
      if (num === 0) continue; // 空白は描画しない

      const row = Math.floor(pos / 3);
      const col = pos % 3;
      const x = gap + col * (cell + gap);
      const y = gap + row * (cell + gap);

      const tileEl = getTileElByNum(num);
      tileEl.style.width = cell + "px";
      tileEl.style.height = cell + "px";
      tileEl.style.transform = "translate(" + x + "px, " + y + "px)";
    }

    layoutRowButtons(outerSize, gap, cell);
  }

  // 行確認ボタンの高さをグリッドに揃え、各ボタンをその行の
  // タイル中心Y座標に正確に合わせて配置する
  function layoutRowButtons(outerSize, gap, cell) {
    rowButtonsEl.style.height = outerSize + "px";

    const btnSize = rowButtonsEl.firstElementChild
      ? rowButtonsEl.firstElementChild.offsetWidth
      : 44;

    for (let row = 0; row < 3; row++) {
      const rowCenterY = gap + row * (cell + gap) + cell / 2;
      const btnEl = rowButtonsEl.children[row];
      const y = rowCenterY - btnSize / 2;
      btnEl.style.transform = "translateY(" + y + "px)";
    }
  }

  /* ===========================================================
     タイルクリック処理(スライド移動)
     =========================================================== */
  function onTileClick(num) {
    if (!canInteract()) return;

    const tilePos = board.indexOf(num);
    const blankPos = board.indexOf(0);

    if (isAdjacent(tilePos, blankPos)) {
      // 番号と空白を入れ替えてスライドさせる
      board[blankPos] = num;
      board[tilePos] = 0;
      layoutTiles();
      incrementMoveCount(); // 動かした回数をカウント
      checkClear();
    }
  }

  // 2つのマスが上下左右に隣接しているか判定
  function isAdjacent(posA, posB) {
    const rowA = Math.floor(posA / 3), colA = posA % 3;
    const rowB = Math.floor(posB / 3), colB = posB % 3;
    const dist = Math.abs(rowA - rowB) + Math.abs(colA - colB);
    return dist === 1;
  }

  /* ===========================================================
     クリア判定 & クリア演出
     =========================================================== */
  function checkClear() {
    const cleared = board.every((v, i) => v === SOLVED_STATE[i]);
    if (cleared) {
      isCleared = true; // ここで即座に操作をロックする
      statusText.textContent = "";
      playClearCelebration();
    }
  }

  // クリア演出本体:
  // 1) 盤面がキラキラ光る
  // 2) ド→レ→ミ→ファ→ソ→ラ→シ→高いドの順に全タイルが鳴る
  // 3) 最後に「じゃーん」というシンバル音と同時にCLEAR!がぽよんと出る
  async function playClearCelebration() {
    isPlayingSound = true;
    setAllSideButtonsDisabled(true);
    muteBtn.disabled = true;

    spawnSparkles();
    gridOuterEl.classList.add("celebrating");

    // ドレミファソラシド(番号1〜8)の順に鳴らす
    for (let num = 1; num <= 8; num++) {
      bounceTile(num);
      await playNote(NOTE_FREQ[num]);
    }

    // シンバルクラッシュと同時にCLEAR!を表示
    playCymbalCrash();
    clearOverlayEl.classList.add("show");

    isPlayingSound = false;
    // isCleared が true の間、Rowボタン・Muteボタンは無効のままにしておく
  }

  // キラキラの粒を指定した中心点(%)から放射状に飛ばす
  // container: 追加先の要素 / cxPercent, cyPercent: 発生中心(0〜100)
  function spawnSparkles(container, cxPercent, cyPercent, count, opts) {
    opts = opts || {};
    const spreadMin = opts.spreadMin || 24;
    const spreadMax = opts.spreadMax || 64;
    const sizeMin = opts.sizeMin || 4;
    const sizeMax = opts.sizeMax || 9;
    const life = opts.life || 1100;
    const starRatio = opts.starRatio != null ? opts.starRatio : 0.35;

    for (let i = 0; i < count; i++) {
      const s = document.createElement("div");
      const isStar = Math.random() < starRatio;
      s.className = "spark" + (isStar ? " star" : "");

      const size = sizeMin + Math.random() * (sizeMax - sizeMin);
      s.style.width = size + "px";
      s.style.height = size + "px";
      s.style.left = cxPercent + "%";
      s.style.top = cyPercent + "%";

      // ランダムな方向・距離へ飛ばす(放射状)
      const angle = Math.random() * Math.PI * 2;
      const dist = spreadMin + Math.random() * (spreadMax - spreadMin);
      s.style.setProperty("--dx", Math.cos(angle) * dist + "px");
      s.style.setProperty("--dy", Math.sin(angle) * dist + "px");
      s.style.setProperty("--rot", Math.random() * 360 + "deg");
      s.style.setProperty("--peak", (0.9 + Math.random() * 0.6).toFixed(2));

      const delay = Math.random() * 180;
      s.style.animationDuration = life + "ms";
      s.style.animationDelay = delay + "ms";

      container.appendChild(s);
      setTimeout(() => s.remove(), life + delay + 250);
    }
  }

  // 盤面全体からキラキラを盛大に飛ばす(演出の開始時に使用)
  function spawnBoardSparkles() {
    // 中心からの大きな一発
    spawnSparkles(gridOuterEl, 50, 50, 20, {
      spreadMin: 30, spreadMax: 80, sizeMin: 4, sizeMax: 10, life: 1300
    });
    // 盤面のあちこちから小さな飛沫を追加して画面いっぱいに広がる印象にする
    for (let i = 0; i < 6; i++) {
      const rx = 12 + Math.random() * 76;
      const ry = 12 + Math.random() * 76;
      spawnSparkles(gridOuterEl, rx, ry, 5, {
        spreadMin: 14, spreadMax: 42, sizeMin: 3, sizeMax: 7, life: 950
      });
    }
  }

  // タイルが鳴るたびに、その位置から小さなキラキラを飛ばす
  function spawnTileSparkles(tileEl) {
    const outerRect = gridOuterEl.getBoundingClientRect();
    const tileRect = tileEl.getBoundingClientRect();
    const cx = ((tileRect.left + tileRect.width / 2 - outerRect.left) / outerRect.width) * 100;
    const cy = ((tileRect.top + tileRect.height / 2 - outerRect.top) / outerRect.height) * 100;

    spawnSparkles(gridOuterEl, cx, cy, 7, {
      spreadMin: 12, spreadMax: 38, sizeMin: 3, sizeMax: 7, life: 750
    });
  }

  // シンバルが鳴る瞬間、一番派手なフィナーレのキラキラを盤面いっぱいに飛ばす
  function spawnFinaleSparkles() {
    spawnSparkles(gridOuterEl, 50, 50, 34, {
      spreadMin: 45, spreadMax: 120, sizeMin: 5, sizeMax: 14, life: 1500, starRatio: 0.45
    });
    for (let i = 0; i < 8; i++) {
      const rx = 5 + Math.random() * 90;
      const ry = 5 + Math.random() * 90;
      spawnSparkles(gridOuterEl, rx, ry, 4, {
        spreadMin: 20, spreadMax: 55, sizeMin: 4, sizeMax: 9, life: 1100
      });
    }
  }

  function clearSparkles() {
    gridOuterEl.querySelectorAll(".spark").forEach((s) => s.remove());
  }

  function hideClearOverlay() {
    isCleared = false;
    clearOverlayEl.classList.remove("show");
    gridOuterEl.classList.remove("celebrating");
    clearSparkles();
    // Shuffleしたので、Rowボタン・Muteボタンを再び使えるようにする
    setAllSideButtonsDisabled(false);
    muteBtn.disabled = false;
  }

  /* ===========================================================
     シャッフル(必ず解ける盤面を生成)
     完成形からランダムに空白を動かし続けることで、
     どんな結果になっても必ず解ける状態を保証する
     =========================================================== */
  function shuffleBoard(options) {
    const animateCountReset = options && options.animateCountReset;

    hideClearOverlay();

    let state = SOLVED_STATE.slice();
    let blankPos = state.indexOf(0);
    let lastMove = -1;

    const SHUFFLE_STEPS = 150;

    for (let i = 0; i < SHUFFLE_STEPS; i++) {
      const neighbors = getNeighborPositions(blankPos);
      // 直前と逆方向の移動をなるべく避けて偏りを減らす
      const candidates = neighbors.filter((n) => n !== lastMove);
      const pool = candidates.length > 0 ? candidates : neighbors;
      const nextPos = pool[Math.floor(Math.random() * pool.length)];

      state[blankPos] = state[nextPos];
      state[nextPos] = 0;
      lastMove = blankPos;
      blankPos = nextPos;
    }

    board = state;

    layoutTiles();
    statusText.textContent = "";

    // 「音を聞いた回数」「動かした回数」を両方リセットする
    if (animateCountReset) {
      animateCountdown(playCountEl, "音を聞いた回数", playCount);
      animateCountdown(moveCountEl, "動かした回数", moveCount);
    } else {
      playCountEl.textContent = "音を聞いた回数: 0";
      moveCountEl.textContent = "動かした回数: 0";
    }
    playCount = 0;
    moveCount = 0;
  }

  function getNeighborPositions(pos) {
    const row = Math.floor(pos / 3), col = pos % 3;
    const result = [];
    if (row > 0) result.push(pos - 3);
    if (row < 2) result.push(pos + 3);
    if (col > 0) result.push(pos - 1);
    if (col < 2) result.push(pos + 1);
    return result;
  }

  /* ===========================================================
     ミュート切り替え
     =========================================================== */
  function toggleMute() {
    if (isCleared) return; // クリア演出中〜クリア表示中は操作不可
    isMuted = !isMuted;
    muteBtn.textContent = "Mute: " + (isMuted ? "ON" : "OFF");
    muteBtn.classList.toggle("active-toggle", isMuted);
  }

  /* ===========================================================
     起動
     =========================================================== */
  init();
})();
</script>
</body>
